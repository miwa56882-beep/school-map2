<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>学祭3Dマップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(15, 15, 15);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ライト
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// 床
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({color: 0xffffff})
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// 部屋作成関数
function room(x, z, w, d, color, name){
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, 2, d),
    new THREE.MeshStandardMaterial({color: color})
  );
  mesh.position.set(x, 1, z);
  scene.add(mesh);
}

// ===== 左ブロック =====
room(-8, 5, 3, 3, 0xa8e6cf, "保健室");
room(-8, 2, 3, 3, 0xffd3b6, "和室");
room(-8, -1, 3, 3, 0xdcedc1, "CALL");
room(-8, -4, 3, 3, 0xffaaa5, "演劇");

// ===== 中庭 =====
room(0, 0, 4, 4, 0x81c784, "中庭");

// ===== 中央階段 =====
room(0, -5, 2, 2, 0xb0bec5, "階段");

// ===== 右ブロック =====
room(8, 5, 3, 3, 0xffcc80, "調理室");
room(8, 2, 3, 3, 0x90caf9, "展示");
room(8, -1, 3, 3, 0x90caf9, "展示");
room(8, -4, 3, 3, 0x90caf9, "展示");

// ===== 普通教室棟 =====
room(0, -10, 10, 3, 0xce93d8, "普通教室");

// ===== キッチンカー =====
room(14, 0, 2, 4, 0xa5d6a7, "キッチンカー");

// ループ
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// リサイズ対応
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
